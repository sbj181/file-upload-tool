[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Canonical domain is files.thegrovery.com. Redirect the legacy .dev URL to it.
[[redirects]]
  from = "https://file-upload-tool.thegrovery.dev/*"
  to = "https://files.thegrovery.com/:splat"
  status = 301
  force = true
